/* ---------------------------------- Placeholder image generator --------------------------------- */
function productImage(kind, brand, model) {
  const NAVY='%230B2E5C', BLUE='%231B5FAE', SKY='%23EAF3FC', GOLD='%23F2A900';
  let icon = '';
  if (kind === 'printer') icon = `<rect x='60' y='90' width='180' height='90' rx='10' fill='${BLUE}'/><rect x='80' y='60' width='140' height='45' rx='6' fill='${NAVY}'/><rect x='85' y='180' width='130' height='60' rx='6' fill='${NAVY}' opacity='0.15'/><rect x='100' y='195' width='100' height='10' rx='3' fill='${GOLD}'/>`;
  else if (kind === 'copier') icon = `<rect x='45' y='70' width='210' height='130' rx='10' fill='${NAVY}'/><rect x='65' y='90' width='170' height='60' rx='6' fill='${BLUE}'/><rect x='65' y='160' width='170' height='8' rx='3' fill='${GOLD}'/><rect x='90' y='55' width='120' height='20' rx='4' fill='${NAVY}' opacity='0.7'/>`;
  else if (kind === 'ink') icon = `<path d='M150 50 C185 100 205 135 205 165 A55 55 0 1 1 95 165 C95 135 115 100 150 50 Z' fill='${BLUE}'/><ellipse cx='150' cy='175' rx='30' ry='18' fill='${SKY}' opacity='0.5'/>`;
  else if (kind === 'toner') icon = `<rect x='75' y='90' width='150' height='90' rx='14' fill='${NAVY}'/><rect x='75' y='90' width='150' height='26' rx='14' fill='${GOLD}'/><rect x='100' y='140' width='100' height='14' rx='4' fill='${BLUE}'/>`;
  else icon = `<circle cx='150' cy='140' r='70' fill='${BLUE}' opacity='0.15'/><circle cx='150' cy='140' r='45' fill='${NAVY}'/><circle cx='150' cy='140' r='16' fill='${GOLD}'/>`;
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><rect width='300' height='300' fill='${SKY}'/>${icon}<text x='150' y='255' text-anchor='middle' font-family='Arial' font-size='20' font-weight='700' fill='${NAVY}'>${brand}</text><text x='150' y='278' text-anchor='middle' font-family='Arial' font-size='14' fill='${BLUE}'>${model}</text></svg>`;
  return `data:image/svg+xml,${svg.replace(/#/g,'%23').replace(/\n/g,'')}`;
}

/* ---------------------------------- Mock historical sales (for the dashboard chart) --------------------------------- */
function seedSalesHistory() {
  const days = [];
  const today = new Date();
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    const revenue = Math.round(8000 + Math.random() * 22000);
    const orderCount = Math.round(2 + Math.random() * 9);
    days.push({ day: iso, revenue, order_count: orderCount });
  }
  return days;
}

function seedOrders() {
  const statuses = ['completed','completed','completed','shipped','processing','paid'];
  const orders = [];
  const today = new Date();
  let seq = 0;
  CRM_CUSTOMERS.forEach((cust) => {
    for (let i = 0; i < cust.orderCount; i++) {
      const d = new Date(today); d.setDate(d.getDate() - Math.floor(Math.random()*20));
      const items = [];
      const n = 1 + Math.floor(Math.random()*3);
      let subtotal = 0;
      const used = new Set();
      for (let j=0;j<n;j++){
        let p = PRODUCTS[Math.floor(Math.random()*PRODUCTS.length)];
        if (used.has(p.id)) continue;
        used.add(p.id);
        const qty = 1 + Math.floor(Math.random()*2);
        subtotal += p.price*qty;
        items.push({ product_id:p.id, name:p.name, price:p.price, quantity:qty });
      }
      const shipping = 150;
      orders.push({
        id: 'seed-'+(seq++),
        order_number: `PRN-${d.toISOString().slice(0,10).replace(/-/g,'')}-${1000+seq}`,
        status: statuses[Math.floor(Math.random()*statuses.length)],
        items, subtotal, shipping, total: subtotal+shipping,
        payment_method: ['gcash','paymaya','card','grab_pay','cod'][Math.floor(Math.random()*5)],
        customer_name: cust.name,
        customer_email: cust.email,
        customer_phone: cust.phone,
        placed_offline: Math.random() < 0.15,
        created_at: d.toISOString(),
      });
    }
  });
  return orders.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
}

/* ---------------------------------- State --------------------------------- */
function defaultState() {
  const inventory = {};
  PRODUCTS.forEach(p => { inventory[p.id] = { stock: p.stock, reorder_level: p.reorder_level }; });
  return {
    cart: [],               // { product_id, quantity }
    orders: seedOrders(),
    pendingOfflineOrders: [],
    inventory,
    inventoryMovements: {},  // product_id -> [{change, reason, date}]
    salesHistory: seedSalesHistory(),
    adminLoggedIn: false,
    offline: false,
    toasts: [],
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return defaultState();
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function resetDemoData() {
  if (!confirm('Reset all demo data (cart, orders, inventory) back to the starting scenario?')) return;
  state = defaultState();
  saveState();
  goTo('#/');
  showToast('Demo data reset.');
}

/* ---------------------------------- Helpers --------------------------------- */
function formatPHP(n) {
  return new Intl.NumberFormat('en-PH', { style:'currency', currency:'PHP', maximumFractionDigits:2 }).format(n||0);
}
function getProduct(id){ return PRODUCTS.find(p=>p.id===id); }
function getProductBySlug(slug){ return PRODUCTS.find(p=>p.slug===slug); }
function getCategory(id){ return CATEGORIES.find(c=>c.id===id); }
function stockOf(id){ return state.inventory[id]?.stock ?? 0; }
function cartCount(){ return state.cart.reduce((n,i)=>n+i.quantity,0); }
function cartSubtotal(){ return state.cart.reduce((sum,i)=> sum + getProduct(i.product_id).price * i.quantity, 0); }
function esc(s){ return (s??'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg, tone='navy') {
  const id = Date.now()+Math.random();
  state.toasts.push({ id, msg, tone });
  renderToasts();
  setTimeout(() => { state.toasts = state.toasts.filter(t=>t.id!==id); renderToasts(); }, 3200);
}
function renderToasts() {
  let el = document.getElementById('toast-container');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast-container';
    el.className = 'fixed bottom-4 left-4 z-50 space-y-2';
    document.body.appendChild(el);
  }
  el.innerHTML = state.toasts.map(t => `
    <div class="toast bg-navy text-white text-sm rounded-module px-4 py-2.5 shadow-lg max-w-xs">${esc(t.msg)}</div>
  `).join('');
}

/* ---------------------------------- Simulated network / offline mode --------------------------------- */
function toggleOffline(checked) {
  state.offline = checked;
  saveState();
  if (!checked && state.pendingOfflineOrders.length) {
    syncOfflineOrders();
  }
  render();
}
function toggleDemoPanel() {
  const body = document.getElementById('demo-panel-body');
  body.classList.toggle('hidden');
}
function syncOfflineOrders() {
  const queued = state.pendingOfflineOrders;
  if (!queued.length) return;
  queued.forEach(o => {
    o.placed_offline = true;
    o.status = o.payment_method === 'cod' ? 'pending' : 'paid';
    state.orders.unshift(o);
  });
  state.pendingOfflineOrders = [];
  saveState();
  showToast(`${queued.length} offline order(s) synced successfully.`);
}

/* ---------------------------------- Router --------------------------------- */
function goTo(hash) { window.location.hash = hash; }
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => { render(); renderToasts(); });

function currentRoute() {
  const hash = window.location.hash || '#/';
  const pathOnly = hash.split('?')[0];
  const parts = pathOnly.replace(/^#\//,'').split('/').filter(Boolean);
  return parts;
}

function render() {
  saveState();
  const parts = currentRoute();
  const app = document.getElementById('app');
  window.scrollTo(0,0);

  if (parts[0] === 'admin') {
    app.innerHTML = renderAdmin(parts.slice(1));
  } else {
    app.innerHTML = renderStore(parts);
  }
  document.getElementById('offline-toggle').checked = state.offline;
  attachDeferredWork();
}

/* Some views need post-render JS (charts). We track a queue. */
let deferredWork = [];
function attachDeferredWork() {
  const work = deferredWork; deferredWork = [];
  work.forEach(fn => fn());
}

/* ---------------------------------- Keyword search --------------------------------- */
function tokenize(q) { return (q||'').toLowerCase().split(/\s+/).filter(Boolean); }

function searchHaystack(p) {
  const cat = getCategory(p.category_id);
  return [p.name, p.brand, p.sku, p.description, cat?.name, ...(COMPAT[p.id]||[])].join(' ').toLowerCase();
}

// Matches ALL keywords (across name, brand, SKU, description, category and
// compatible-model fields), so multi-word queries like "canon ink" or
// "epson toner" narrow correctly instead of requiring one exact substring.
function searchProducts(query) {
  const tokens = tokenize(query);
  if (!tokens.length) return [];
  const q0 = tokens[0];
  return PRODUCTS
    .filter(p => { const hay = searchHaystack(p); return tokens.every(t => hay.includes(t)); })
    .sort((a,b) => {
      const rank = (p) => {
        const name = p.name.toLowerCase();
        if (name.startsWith(q0)) return 0;
        if (p.brand.toLowerCase() === q0) return 1;
        if (name.includes(q0)) return 2;
        if (p.sku.toLowerCase().includes(q0)) return 3;
        return 4;
      };
      return rank(a) - rank(b);
    });
}

function groupByCategory(products) {
  const buckets = {};
  products.forEach(p => { (buckets[p.category_id] ||= []).push(p); });
  return CATEGORIES.map(c => ({ category:c, products: buckets[c.id]||[] })).filter(g => g.products.length);
}

let searchDropdownQuery = '';
function handleSearchInput(value, variant) {
  searchDropdownQuery = value;
  const dropdown = document.getElementById('search-dropdown-'+variant);
  if (!dropdown) return;
  const q = value.trim();
  if (q.length < 2) { dropdown.classList.add('hidden'); dropdown.innerHTML=''; return; }

  const results = searchProducts(q);
  if (results.length === 0) {
    dropdown.innerHTML = `<div class="p-4 text-sm text-slate">No products match "${esc(q)}".</div>`;
    dropdown.classList.remove('hidden');
    return;
  }

  const grouped = groupByCategory(results).map(g => ({ category:g.category, products:g.products.slice(0,3) }));
  const totalShown = grouped.reduce((n,g)=>n+g.products.length,0);

  dropdown.innerHTML = `
    <div class="max-h-96 overflow-y-auto scrollbar-thin">
      ${grouped.map(g => `
        <div class="border-b border-skyBorder last:border-b-0">
          <p class="px-4 pt-3 pb-1 text-[11px] font-semibold uppercase tracking-wide text-blue">${esc(g.category.name)} <span class="text-slate font-normal">(${searchProducts(q).filter(p=>p.category_id===g.category.id).length})</span></p>
          ${g.products.map(p => `
            <button type="button" onclick="goToSearchResult('${p.slug}','${variant}')" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-sky transition text-left">
              <img src="${p.image}" class="w-9 h-9 object-contain bg-sky rounded shrink-0">
              <span class="min-w-0 flex-1">
                <span class="block text-sm font-medium line-clamp-1">${esc(p.name)}</span>
                <span class="block text-xs text-slate">${esc(p.brand)} · ${formatPHP(p.price)}</span>
              </span>
            </button>`).join('')}
        </div>`).join('')}
    </div>
    <button type="button" onclick="submitSearchFromDropdown('${esc(q).replace(/'/g,"\\'")}','${variant}')" class="w-full text-center text-sm font-semibold text-blue hover:bg-sky py-2.5 border-t border-skyBorder transition">
      View all ${results.length} result${results.length===1?'':'s'} for "${esc(q)}"
    </button>`;
  dropdown.classList.remove('hidden');
}

function goToSearchResult(slug, variant) {
  closeSearchDropdown(variant);
  goTo('#/product/'+slug);
}
function submitSearchFromDropdown(q, variant) {
  closeSearchDropdown(variant);
  goTo('#/shop'+(q?('?search='+encodeURIComponent(q)):''));

function closeSearchDropdown(variant) {
  const dropdown = document.getElementById('search-dropdown-'+variant);
  if (dropdown) { dropdown.classList.add('hidden'); dropdown.innerHTML=''; }

function submitSearch(e, variant) {
  e.preventDefault();
  const input = document.getElementById(variant==='mobile' ? 'nav-search-mobile' : 'nav-search');
  const q = input ? input.value.trim() : '';
  closeSearchDropdown(variant);
  goTo('#/shop'+(q?('?search='+encodeURIComponent(q)):''));
}
document.addEventListener('click', (e) => {
  ['desktop','mobile'].forEach(variant => {
    const wrap = document.getElementById('search-wrap-'+variant);
    if (wrap && !wrap.contains(e.target)) closeSearchDropdown(variant);
  });
});

function parseQuery(str) {
  const q = {};
  (str||'').replace(/^\?/,'').split('&').filter(Boolean).forEach(pair => {
    const [k,v] = pair.split('=');
    q[decodeURIComponent(k)] = decodeURIComponent(v||'');
  });
  return q;
}

function viewShop() {
  const hash = window.location.hash;
  const [routePart, queryPart] = hash.split('?');
  const parts = routePart.replace(/^#\//,'').split('/').filter(Boolean);
  const categorySlug = parts[1] || '';
  const q = parseQuery(queryPart);
  const search = q.search || '';
  const searchSuffix = search ? `?search=${encodeURIComponent(search)}` : '';

  let list = search ? searchProducts(search) : PRODUCTS.slice();
  if (categorySlug) list = list.filter(p => getCategory(p.category_id)?.slug === categorySlug);

  const chips = CATEGORIES.map(c => `
    <a href="#/shop/${c.slug}${searchSuffix}" class="text-xs font-semibold px-3 py-1.5 rounded-full border ${categorySlug===c.slug ? 'bg-blue text-white border-blue' : 'bg-white text-navy border-skyBorder'}">${esc(c.name)}</a>
  `).join('');

  const activeCategory = categorySlug ? CATEGORIES.find(c => c.slug === categorySlug) : null;
  const title = search ? `Results for "${esc(search)}"` : (activeCategory ? activeCategory.name : 'All Products');

  let resultsHtml;
  if (list.length === 0) {
    resultsHtml = `<p class="text-slate text-sm py-16 text-center">No products found. Try a different search or category.</p>`;
  } else if (search && !categorySlug) {
    // Group results by category so it's clear where each match came from.
    const groups = groupByCategory(list);
    resultsHtml = groups.map(g => `
      <div class="mb-8 last:mb-0">
        <div class="flex items-center gap-2 mb-3">
          <h2 class="font-display font-bold text-navy text-lg">${esc(g.category.name)}</h2>
          <span class="text-xs text-slate bg-sky border border-skyBorder rounded-full px-2 py-0.5">${g.products.length} result${g.products.length===1?'':'s'}</span>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${g.products.map(productCard).join('')}</div>
      </div>`).join('');
  } else {
    resultsHtml = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${list.map(productCard).join('')}</div>`;
  }

  return `
  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-6">
      <div>

}

function stepQty(delta, max) {
  const el = document.getElementById('pdp-qty');
  let v = parseInt(el.textContent,10) + delta;
  v = Math.max(1, v);
  if (max) v = Math.min(max, v);
  el.textContent = v;
}

function addToCart(productId, qty) {
  const existing = state.cart.find(i => i.product_id === productId);
  const available = stockOf(productId);
  if (available <= 0) { showToast('This item is out of stock.'); return; }
  if (existing) {
    existing.quantity = Math.min(available, existing.quantity + qty);
  } else {
    state.cart.push({ product_id: productId, quantity: Math.min(available, qty) });
  }
  saveState();
  showToast(`${getProduct(productId).name} added to cart.`);
  render();
}
function updateCartQty(productId, qty) {
  if (qty <= 0) { removeFromCart(productId); return; }
  const item = state.cart.find(i=>i.product_id===productId);
  if (item) item.quantity = Math.min(stockOf(productId), qty);
  saveState(); render();
}
function removeFromCart(productId) {
  state.cart = state.cart.filter(i=>i.product_id!==productId);
  saveState(); render();
}

function generateOrderNumber() {
  const stamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
  return `PRN-${stamp}-${1000+Math.floor(Math.random()*9000)}`;
}

function submitCheckout(e) {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const customerName = fd.get('full_name');
  const customerEmail = fd.get('email');
  const customerPhone = fd.get('phone');
  const items = state.cart.map(i => ({ product_id:i.product_id, name:getProduct(i.product_id).name, price:getProduct(i.product_id).price, quantity:i.quantity }));
  const subtotal = cartSubtotal();
  const order = {
    id: 'order-'+Date.now(),
    order_number: generateOrderNumber(),
    status: checkoutMethod === 'cod' ? 'pending' : 'paid',
    items, subtotal, shipping: SHIPPING_FLAT, total: subtotal+SHIPPING_FLAT,
    payment_method: checkoutMethod,
    customer_name: customerName,
    customer_email: customerEmail,
    customer_phone: customerPhone,
    placed_offline: false,
    created_at: new Date().toISOString(),
  };

  if (state.offline) {
    state.pendingOfflineOrders.push(order);
    decrementInventoryForOrder(order, false);
    state.cart = [];
    saveState();
    goTo('#/order-queued');
    return;
  }

  if (checkoutMethod === 'cod') {
    finalizeOrder(order);
    return;
  }

  // Simulate redirecting to an e-wallet / card gateway
  showGatewayModal(checkoutMethod, () => finalizeOrder(order));
}

function decrementInventoryForOrder(order, recordMovement) {
  order.items.forEach(i => {
    const inv = state.inventory[i.product_id];
    if (!inv) return;
    inv.stock = Math.max(0, inv.stock - i.quantity);
    if (recordMovement) {
      if (!state.inventoryMovements[i.product_id]) state.inventoryMovements[i.product_id] = [];
      state.inventoryMovements[i.product_id].unshift({ change: -i.quantity, reason: 'sale', date: new Date().toISOString() });
    }
  });
}

function finalizeOrder(order) {
  decrementInventoryForOrder(order, true);
  state.orders.unshift(order);
  const todayIso = new Date().toISOString().slice(0,10);
  const todayEntry = state.salesHistory.find(d => d.day === todayIso);
  if (todayEntry) { todayEntry.revenue += order.total; todayEntry.order_count += 1; }
  state.cart = [];
  saveState();
  window.__lastOrderNumber = order.order_number;
  goTo('#/order-success');
}

function showGatewayModal(method, onComplete) {
  const labels = { gcash:'GCash', paymaya:'Maya', grab_pay:'GrabPay', card:'your card issuer' };
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in';
  overlay.innerHTML = `
    <div class="card p-8 text-center max-w-xs w-full">
      <div class="spinner mx-auto mb-4"></div>
      <p class="font-display font-bold text-navy">Redirecting to ${labels[method]}…</p>
      <p class="text-xs text-slate mt-1">Simulating secure payment authorization</p>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => {
    overlay.innerHTML = `
      <div class="card p-8 text-center max-w-xs w-full">
        <div class="text-green-600 mx-auto mb-3">${ICONS.check.replace('width="18" height="18"','width="40" height="40"')}</div>

        <p class="text-xs text-slate mt-1">Returning to Prinster…</p>

    setTimeout(() => { overlay.remove(); onComplete(); }, 900);
  }, 1600);
}

function computeDashboardSummary() {
  const activeStatuses = ['paid','processing','shipped','completed'];
  const allOrders = state.orders;
  const totalRevenue = allOrders.filter(o=>activeStatuses.includes(o.status)).reduce((s,o)=>s+o.total,0);
  const todayIso = new Date().toISOString().slice(0,10);
  const ordersToday = allOrders.filter(o => o.created_at.slice(0,10) === todayIso).length;
  const revenueToday = allOrders.filter(o => o.created_at.slice(0,10)===todayIso && activeStatuses.includes(o.status)).reduce((s,o)=>s+o.total,0);
  const pendingOrders = allOrders.filter(o=>o.status==='pending').length;
  const lowStock = Object.entries(state.inventory).filter(([id,inv]) => inv.stock <= inv.reorder_level);
  const topMap = {};
  allOrders.filter(o=>activeStatuses.includes(o.status)).forEach(o => {
    o.items.forEach(i => {
      if (!topMap[i.product_id]) topMap[i.product_id] = { name:i.name, units:0, revenue:0 };
      topMap[i.product_id].units += i.quantity;
      topMap[i.product_id].revenue += i.price*i.quantity;
    });
  });
  const topProducts = Object.values(topMap).sort((a,b)=>b.units-a.units).slice(0,5);
  const totalCustomers = new Set(allOrders.map(o=>o.customer_email || o.customer_name)).size;
  return { totalRevenue, ordersToday, revenueToday, pendingOrders, lowStockCount: lowStock.length, topProducts, totalProducts: PRODUCTS.length, totalCustomers };
}

/* ---------------------------------- CRM aggregation --------------------------------- */
// Mirrors the same logic as the real backend's /api/dashboard/customers route:
// group orders by customer identity, compute lifetime value / order count /
// last order date, and apply a lightweight VIP/Repeat/New segmentation.
function computeCrmCustomers() {
  const activeStatuses = ['paid','processing','shipped','completed'];
  const byCustomer = {};
  state.orders.forEach(o => {
    const key = o.customer_email || o.customer_name;
    if (!key) return;
    if (!byCustomer[key]) {
      byCustomer[key] = {
        id: key, name: o.customer_name, email: o.customer_email || '', phone: o.customer_phone || '',
        orders: [], date_registered: o.created_at,
      };
    }
    const c = byCustomer[key];
    if (new Date(o.created_at) < new Date(c.date_registered)) c.date_registered = o.created_at;
    if (activeStatuses.includes(o.status)) c.orders.push(o);
  });

  return Object.values(byCustomer).map(c => {
    const ordersCount = c.orders.length;
    const totalSpend = c.orders.reduce((s,o)=>s+o.total,0);
    const avgOrderValue = ordersCount ? totalSpend/ordersCount : 0;
    const lastOrder = c.orders.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    let segment = 'New';
    if (ordersCount >= 4 || totalSpend >= 50000) segment = 'VIP';
    else if (ordersCount >= 2) segment = 'Repeat';
    return {
      id: c.id, name: c.name, email: c.email, phone: c.phone,
      orders_count: ordersCount, total_spend: totalSpend, avg_order_value: avgOrderValue,
      date_last_order: lastOrder ? lastOrder.created_at : null,
      date_registered: c.date_registered, segment,
    };
  }).sort((a,b)=>b.total_spend-a.total_spend);
}
function getCustomerOrderHistory(customerId) {
  return state.orders
    .filter(o => (o.customer_email || o.customer_name) === customerId)
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
}

    p.name = fd.get('name'); p.category_id = fd.get('category_id'); p.brand = fd.get('brand');
    p.description = fd.get('description'); p.price = parseFloat(fd.get('price'));
    p.compare_at_price = fd.get('compare_at_price') ? parseFloat(fd.get('compare_at_price')) : null;
    showToast('Product updated.');
  } else {

    if (getProduct(id)) { showToast('A product with that SKU already exists.'); return; }
    const newP = {
      id, sku:id, name:fd.get('name'), slug:slugify(fd.get('name')), category_id:fd.get('category_id'),
      brand:fd.get('brand'), description:fd.get('description'), price:parseFloat(fd.get('price')),
      compare_at_price: fd.get('compare_at_price')?parseFloat(fd.get('compare_at_price')):null,
      image: productImage('part', fd.get('brand')||'Prinster', (fd.get('name')||'New').slice(0,12)),
      reorder_level: parseInt(fd.get('reorder_level')||'5',10),
    };
    PRODUCTS.push(newP);
    state.inventory[id] = { stock: parseInt(fd.get('stock')||'0',10), reorder_level: newP.reorder_level };
    showToast('Product created.');
  }
  productModalState = null;
  saveState();
  render();
}
function deactivateProduct(id) {
  if (!confirm('Remove this product from the demo catalog?')) return;
  const idx = PRODUCTS.findIndex(p=>p.id===id);
  if (idx>-1) PRODUCTS.splice(idx,1);
  delete state.inventory[id];
  saveState();
  showToast('Product deactivated.');
  render();
}

  </div>`;
}

/* ---- Admin: Orders ---- */
const ORDER_STATUSES = ['pending','paid','processing','shipped','completed','cancelled','refunded'];
const STATUS_COLORS = {
  pending:'bg-yellow-50 text-yellow-700', paid:'bg-blue-50 text-blue-700', processing:'bg-indigo-50 text-indigo-700',
  shipped:'bg-purple-50 text-purple-700', completed:'bg-green-50 text-green-700', cancelled:'bg-gray-100 text-gray-500', refunded:'bg-red-50 text-red-600'
};
let orderStatusFilter = '';
function viewAdminOrders() {
  let orders = state.orders.slice();
  if (orderStatusFilter) orders = orders.filter(o=>o.status===orderStatusFilter);
  const rows = orders.map(o => `
    <tr>
      <td class="px-4 py-3 font-medium">${esc(o.order_number)}</td>
      <td class="px-4 py-3 text-slate">${new Date(o.created_at).toLocaleString('en-PH')}</td>
      <td class="px-4 py-3 font-semibold">${formatPHP(o.total)}</td>
      <td class="px-4 py-3 text-slate capitalize">${esc(o.payment_method||'—')}</td>
      <td class="px-4 py-3">${o.placed_offline ? `<span class="text-xs bg-sky text-blue px-2 py-0.5 rounded-full">Synced offline order</span>` : `<span class="text-xs text-slate">Online</span>`}</td>
      <td class="px-4 py-3">
        <select onchange="setOrderStatus('${o.id}', this.value)" class="text-xs font-semibold rounded-full px-2 py-1 border-0 outline-none ${STATUS_COLORS[o.status]}">
          ${ORDER_STATUSES.map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
    </tr>`).join('');
  return `
  <div class="p-6 md:p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="font-display font-bold text-2xl text-navy">Orders</h1>
      <select class="input w-auto" onchange="orderStatusFilter=this.value; render();">
        <option value="">All statuses</option>
        ${ORDER_STATUSES.map(s=>`<option value="${s}" ${orderStatusFilter===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="card overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-sky text-navy text-xs uppercase"><tr><th class="text-left px-4 py-3">Order #</th><th class="text-left px-4 py-3">Date</th><th class="text-left px-4 py-3">Total</th><th class="text-left px-4 py-3">Payment</th><th class="text-left px-4 py-3">Source</th><th class="text-left px-4 py-3">Status</th></tr></thead>
        <tbody class="divide-y divide-skyBorder">${rows || `<tr><td colspan="6" class="text-center text-slate py-8">No orders yet.</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}
function setOrderStatus(id, status) {
  const o = state.orders.find(o=>o.id===id);
  if (o) o.status = status;
  saveState();
  showToast(`Order ${o.order_number} marked ${status}.`);
  render();
}

/* Debug helper for QA / smoke testing — safe to leave in, read-only. */
window.__prinsterState = () => state;
</script>
</body>
</html>
